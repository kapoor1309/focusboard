<svg width="900" height="240" viewBox="0 0 900 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FocusBoard">
  <defs>
    <linearGradient id="bg" x1="20" y1="20" x2="220" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1b1b1f"/>
      <stop offset="1" stop-color="#0a0a0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(170 80) rotate(90) scale(150)">
      <stop stop-color="#ff8a4c" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ff8a4c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="orange" x1="70" y1="60" x2="190" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffb277"/>
      <stop offset="0.5" stop-color="#ff8a4c"/>
      <stop offset="1" stop-color="#db5f24"/>
    </linearGradient>
    <linearGradient id="orangeText" x1="560" y1="90" x2="640" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffb277"/>
      <stop offset="1" stop-color="#e06a28"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- mark -->
  <g transform="translate(20 20)">
    <rect width="200" height="200" rx="46" fill="url(#bg)"/>
    <rect width="200" height="200" rx="46" fill="url(#glow)"/>
    <g filter="url(#soft)" opacity="0.55">
      <circle cx="100" cy="100" r="58" stroke="url(#orange)" stroke-width="12" fill="none"
        stroke-linecap="round" stroke-dasharray="281 84" transform="rotate(-58 100 100)"/>
    </g>
    <circle cx="100" cy="100" r="58" stroke="url(#orange)" stroke-width="12" fill="none"
      stroke-linecap="round" stroke-dasharray="281 84" transform="rotate(-58 100 100)"/>
    <circle cx="100" cy="100" r="20" fill="url(#orange)"/>
    <rect x="0.75" y="0.75" width="198.5" height="198.5" rx="45.25" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1.5"/>
  </g>

  <!-- wordmark -->
  <text x="264" y="140" font-family="ui-sans-serif, system-ui, 'Segoe UI', Roboto, sans-serif"
    font-size="86" font-weight="700" letter-spacing="-2">
    <tspan fill="#f4f1ec">Focus</tspan><tspan fill="url(#orangeText)">Board</tspan>
  </text>
  <text x="266" y="180" font-family="ui-sans-serif, system-ui, 'Segoe UI', Roboto, sans-serif"
    font-size="21" font-weight="500" letter-spacing="5" fill="#645f59">STAY AT THE GATE</text>
</svg>
