<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FocusBoard">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1b1b1f"/>
      <stop offset="1" stop-color="#0a0a0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(360 150) rotate(90) scale(320)">
      <stop stop-color="#ff8a4c" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#ff8a4c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="orange" x1="130" y1="120" x2="390" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffb277"/>
      <stop offset="0.5" stop-color="#ff8a4c"/>
      <stop offset="1" stop-color="#db5f24"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- badge -->
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect width="512" height="512" rx="116" fill="url(#glow)"/>

  <!-- soft glow behind the ring -->
  <g filter="url(#soft)" opacity="0.55">
    <circle cx="256" cy="256" r="150" stroke="url(#orange)" stroke-width="30" fill="none"
      stroke-linecap="round" stroke-dasharray="726 216" transform="rotate(-58 256 256)"/>
  </g>

  <!-- focus / pulse ring with a gap -->
  <circle cx="256" cy="256" r="150" stroke="url(#orange)" stroke-width="30" fill="none"
    stroke-linecap="round" stroke-dasharray="726 216" transform="rotate(-58 256 256)"/>

  <!-- centre pulse dot -->
  <circle cx="256" cy="256" r="50" fill="url(#orange)"/>

  <!-- inner highlight -->
  <rect x="1" y="1" width="510" height="510" rx="115" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="2"/>
</svg>
